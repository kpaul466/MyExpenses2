<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="80%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#312E81" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#FFFFFF" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4F46E5" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Outer subtle shadow layer -->
  <rect x="28" y="28" width="456" height="456" rx="124" fill="#312E81" filter="url(#shadow)"/>
  
  <!-- Main Squircle Background -->
  <rect x="24" y="24" width="464" height="464" rx="120" fill="url(#primaryGrad)"/>
  
  <!-- Subtle inner shiny ring -->
  <rect x="26" y="26" width="460" height="460" rx="118" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="4"/>
  
  <!-- Additional accent ring -->
  <rect x="44" y="44" width="424" height="424" rx="104" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
  
  <!-- The Rupee Symbol -->
  <!-- Made out of pristine geometric paths for perfect rendering -->
  <g filter="url(#glow)">
    <!-- Base text rendering just in case, but let's map out the text to perfectly scalable paths if possible, or just use a very distinct sans-serif font rendering with crisp SVG features -->
    <text x="256" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="280" fill="url(#symbolGrad)" text-anchor="middle" filter="url(#innerGlow)">₹</text>
  </g>
</svg>
